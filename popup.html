<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Lovable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette */
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --glass-bg: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      /* Indigo */
      --primary-gradient: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      --accent-glow: rgba(99, 102, 241, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100%;
      height: 100vh;
      background-color: var(--bg-darker);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      overflow: hidden;
      font-size: 14px;
    }
    
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-darker);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      backdrop-filter: blur(20px);
      background-color: var(--bg-darker);
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(2, 6, 23, 0.6);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-container {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 3px;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .app-title {
      display: flex;
      flex-direction: column;
    }

    .app-title h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .app-title span {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* CHAT AREA */
    .history {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      background-color: var(--bg-darker);
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 13.5px;
      line-height: 1.5;
      position: relative;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--primary-gradient);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .bubble.bot {
      align-self: flex-start;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    /* FOOTER / INPUT AREA */
    .footer {
      background: rgba(2, 6, 23, 0.8);
      border-top: 1px solid var(--glass-border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(20px);
    }

    /* Status Bar Styled as a Pill */
    #status {
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    #status.warning {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    #status.success {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    /* Upload & Controls */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .upload-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-icon {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .file-chip {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      max-width: 150px;
    }

    .file-chip span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-chip button {
      background: none;
      border: none;
      color: #34d399;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }

    /* Input Box */
    .input-wrapper {
      position: relative;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 4px;
      transition: border-color 0.2s;
      display: flex;
      align-items: flex-end;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      resize: none;
      min-height: 44px;
      max-height: 100px;
      outline: none;
    }

    textarea::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }

    .action-group {
      display: flex;
      gap: 4px;
      padding: 4px;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary-gradient);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .send-btn:hover {
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .mode-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .mode-btn.active {
      color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }

    .hidden {
      display: none !important;
    }

    /* Gamified Loader */
    .gamified-loader {
      margin: 0 20px 10px 20px;
      padding: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--primary);
      border-radius: var(--radius-md);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(10px);
      animation: slideIn 0.3s ease-out;
      position: relative;
      overflow: hidden;
    }

    /* Glitch effect overlay */
    .gamified-loader::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      animation: glitchScan 2s infinite;
      pointer-events: none;
    }

    @keyframes glitchScan {
      0% {
        left: -100%;
      }

      100% {
        left: 200%;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Courier New', monospace;
      /* Tech feel */
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 5px rgba(99, 102, 241, 0.4);
    }

    .loader-track {
      height: 8px;
      background: rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #d946ef, #ef4444);
      background-size: 200% 100%;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
      border-radius: 3px;
      animation: gradientShift 1s linear infinite;
    }

    .loader-fill.animating {
      animation: progress 5s linear forwards, gradientShift 1s linear infinite;
    }

    @keyframes progress {
      0% {
        width: 0%;
      }

      20% {
        width: 15%;
      }

      40% {
        width: 30%;
      }

      60% {
        width: 65%;
      }

      80% {
        width: 85%;
      }

      90% {
        width: 95%;
      }

      100% {
        width: 100%;
      }
    }

    @keyframes gradientShift {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: -100% 0;
      }
    }

    /* Auth Screen Overlay */
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-darker);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      backdrop-filter: blur(20px);
    }

    .auth-card {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
    }

    .auth-title {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .auth-input {
      width: 100%;
      background: rgba(2, 6, 23, 0.6);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 12px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .auth-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .auth-btn:hover {
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-1px);
    }

    .auth-status {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: var(--danger);
    }

    .auth-status.success {
      color: var(--success);
    }
  </style>
</head>

<body>
  <!-- Auth Overlay - Login -->
  <div id="authOverlay" class="auth-overlay">
    <div class="logo-container" style="width:64px; height:64px; margin-bottom:20px; display:flex; align-items:center; justify-content:center; font-size:48px; font-weight:700; color:#22c55e;">
      L
    </div>
    <div class="auth-card">
      <div class="auth-title">Autenticação Necessária</div>
      <p style="font-size:12px; color:var(--text-muted); text-align:center; margin-top:-5px;">
        Faça login para usar a extensão
      </p>

      <input type="email" id="emailInput" class="auth-input" placeholder="Email" autocomplete="email" />
      <input type="password" id="passwordInput" class="auth-input" placeholder="Senha" autocomplete="current-password" />

      <div id="authStatus" class="auth-status"></div>

      <button id="loginBtn" class="auth-btn">ENTRAR</button>
      
      <button id="logoutBtn" class="auth-btn hidden" style="background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid rgba(239,68,68,0.3);">
        SAIR
      </button>
    </div>
  </div>

  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="logo-container" style="display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:#22c55e;">
          L
        </div>
        <div class="app-title">
          <h1>Painel Lovable</h1>
          <span>Extensão de Produtividade</span>
        </div>
      </div>
      <!-- Optional: Add a settings or minimize icon here if needed -->
    </header>

    <!-- Status Bar (Floating) -->
    <div style="padding: 0 20px; margin-top: 10px;">
      <div id="status" class="status warning">
        Abra um projeto Lovable
      </div>
    </div>

    <!-- Gamified Loader (Hidden by default) -->
    <div id="gamifiedLoader" class="gamified-loader hidden">
      <div class="loader-header">
        <span id="loaderLabel">PROCESSANDO DADOS...</span>
        <span id="loaderPercent">0%</span>
      </div>
      <div class="loader-track">
        <div id="loaderFill" class="loader-fill"></div>
      </div>
    </div>


    <!-- Chat History -->
    <div class="history" id="history">
      <!-- Bubbles will be injected here by JS -->
    </div>

    <!-- Footer Area -->
    <footer class="footer">

      <!-- Upload & File Info -->
      <div class="controls-row">
        <div class="upload-container">
          <input type="file" id="uploadInput" accept="image/*,.pdf,.txt,.doc,.docx" style="display: none" />

          <button id="uploadBtn" class="btn-icon" title="Anexar arquivo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
            </svg>
            <span style="margin-left:6px">Anexar</span>
          </button>

          <div id="fileInfo" class="file-chip hidden">
            <span id="fileNameDisplay">arquivo.txt</span>
            <button id="clearFileBtn">×</button>
          </div>
        </div>
      </div>

      <!-- Input Wrapper -->
      <div class="input-wrapper">
        <textarea id="message" placeholder="Digite sua mensagem..."></textarea>

        <div class="action-group">
          <!-- Chat Mode Toggle -->
          <button id="chatModeBtn" class="mode-btn" title="Alternar modo chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>

          <!-- Send Button -->
          <button id="sendBtn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
